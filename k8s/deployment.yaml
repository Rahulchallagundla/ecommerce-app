apiVersion: apps/v1
kind: Deployment

metadata:
  name: ecommerce
  namespace: ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ecommerce

  template:
    metadata:
      labels:
        app: ecommerce

    spec:
      containers:
      - name: ecommerce

        image: IMAGE_URI

        ports:
        - containerPort: 8080
