apiVersion: apps/v1
kind: Deployment

metadata:
  name: ecommerce
  namespace: ecommerce

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ecommerce

  template:
    metadata:
      labels:
        app: ecommerce

    spec:
      containers:
      - name: ecommerce
        image: 466825169799.dkr.ecr.ap-south-1.amazonaws.com/ecommerce:v1

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
